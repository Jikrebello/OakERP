services:
  oakdb:
    image: postgres:16
    container_name: oakdb
    restart: always
    environment:
      POSTGRES_USER: oakadmin
      POSTGRES_PASSWORD: oakpass
      POSTGRES_DB: oakerp               # default DB
    ports:
      - "5433:5432"                     # host 5433 -> container 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oakadmin -d oakerp"]
      interval: 5s
      timeout: 3s
      retries: 10

  oakadmin:
    image: dpage/pgadmin4:latest
    container_name: oakadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oakerp.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'      # optional for single-user use
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  postgres_data:
  pgadmin_data:
